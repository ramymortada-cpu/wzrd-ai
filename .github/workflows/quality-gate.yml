name: WZRD AI Quality & Security Gate

# Least privilege: workflow only needs read access to the repo contents.
# pull_request (not pull_request_target): runs on the merge preview; secrets stay
# unavailable to untrusted fork code by default — safer for public repos.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  audit-and-lint:
    # Must match Branch protection / ruleset “required status check” name.
    name: quality-gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔒 Security Audit
        run: pnpm audit --prod

      - name: 🧹 Type Check (TypeScript)
        run: pnpm run check

      - name: ✨ Code Quality (ESLint)
        run: pnpm run lint

      - name: 🏗️ Test Build
        run: pnpm run build
